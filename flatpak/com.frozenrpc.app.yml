app-id: com.frozenrpc.app
runtime: org.electronjs.Electron2.BaseApp
runtime-version: '24.08'
sdk: org.freedesktop.Sdk//24.08
command: frozen-rpc
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --filesystem=home
modules:
  - name: frozen-rpc
    buildsystem: simple
    build-commands:
      - cp -r * /app/
    sources:
      - type: dir
        path: ..
        dest: .
        skip:
          - node_modules
          - dist
          - .git
          - flatpak
    post-install:
      - install -Dm644 /app/assets/icon.png /app/share/icons/hicolor/1000x1000/apps/com.frozenrpc.app.png
      - install -Dm644 /app/flatpak/com.frozenrpc.app.desktop /app/share/applications/com.frozenrpc.app.desktop
      - install -Dm644 /app/flatpak/com.frozenrpc.app.appdata.xml /app/share/appdata/com.frozenrpc.app.appdata.xml
