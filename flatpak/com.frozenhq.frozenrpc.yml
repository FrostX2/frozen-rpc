app-id: com.frozenhq.frozenrpc
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk//24.08
command: frozen-rpc
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --filesystem=home
  - --no-talk-name=org.freedesktop.Notifications
modules:
  - name: frozen-rpc
    buildsystem: simple
    build-commands:
      - cp -r * /app/
      - mkdir -p /app/bin
      - ln -sf /app/flatpak/frozen-rpc.sh /app/bin/frozen-rpc
      - chmod +x /app/flatpak/frozen-rpc.sh
    sources:
      - type: dir
        path: ..
        dest: .
        skip:
          - dist
          - .git
    post-install:
      - install -Dm644 /app/assets/icon.png /app/share/icons/hicolor/512x512/apps/com.frozenhq.frozenrpc.png
      - install -Dm644 /app/assets/icon.png /app/share/icons/hicolor/256x256/apps/com.frozenhq.frozenrpc.png
      - install -Dm644 /app/assets/icon.png /app/share/icons/hicolor/128x128/apps/com.frozenhq.frozenrpc.png
      - install -Dm644 /app/flatpak/com.frozenhq.frozenrpc.desktop /app/share/applications/com.frozenhq.frozenrpc.desktop
      - install -Dm644 /app/flatpak/com.frozenhq.frozenrpc.appdata.xml /app/share/appdata/com.frozenhq.frozenrpc.appdata.xml
